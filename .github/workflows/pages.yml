name: Development overview (Pages)

on:
  push:
    branches: [main]
    paths:
      - "docs/development-overview.md"
      - "data/development-overview/**"
      - "scripts/gen-development-overview.sh"
      - "scripts/refresh-development-overview.sh"
      - "scripts/refresh_development_overview.py"
      - "scripts/development-overview-live.js"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "docs/development-overview.md"
      - "data/development-overview/**"
      - "scripts/gen-development-overview.sh"
      - "scripts/refresh-development-overview.sh"
      - "scripts/refresh_development_overview.py"
      - "scripts/development-overview-live.js"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: python3 -m pip install markdown

      - name: Refresh status.json from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/refresh-development-overview.sh
          ./scripts/refresh-development-overview.sh

      - name: Generate static site
        run: |
          chmod +x scripts/gen-development-overview.sh
          ./scripts/gen-development-overview.sh

      - name: Verify output
        run: |
          test -f site/development-overview/index.html
          test -f site/development-overview/status.json
          test -f site/index.html
          test -f site/CNAME
          python3 -c "import json; d=json.load(open('site/development-overview/status.json')); assert d['metrics']['public_repos'] >= 1"

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
