name: Refresh development overview (Pages)

# Redeploy Pages periodically so the static snapshot stays fresh.
# Live PR data is fetched client-side via GitHub API (live.js).
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'li-langverse/roadmap'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: python3 -m pip install markdown

      - name: Generate static site
        run: |
          chmod +x scripts/gen-development-overview.sh
          ./scripts/gen-development-overview.sh

      - name: Verify output
        run: test -f site/development-overview/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
