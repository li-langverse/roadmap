name: Roadmap CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-kit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify agent-kit scripts
        run: |
          chmod +x scripts/*.sh agent-kit/.cursor/hooks/*.sh
          ./scripts/verify-agent-kit.sh lic || true
      - name: Dry-run manifest
        run: test -f agent-kit/manifest.toml

  branch-protection:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Verify org branch rulesets (this repo)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/verify-org-branch-protection.sh
          ./scripts/verify-org-branch-protection.sh roadmap

  markdown:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs exist
        run: |
          test -f docs/ecosystem/engineering-standards.md
          test -f docs/roadmap/milestones.md
          test -f docs/development-overview.md
          test -f agent-kit/.cursor/rules/li-pr-only.mdc

      - name: Ecosystem stats snapshot
        env:
          ECOSYSTEM_STATS_SKIP_CLONE: "1"
        run: |
          chmod +x scripts/compute-ecosystem-stats.py
          python3 scripts/compute-ecosystem-stats.py
          test -f data/development-overview/ecosystem-stats.json

      - name: Build development overview (dry-run)
        run: |
          python3 -m pip install markdown
          chmod +x scripts/gen-development-overview.sh
          ./scripts/gen-development-overview.sh
          test -f site/development-overview/index.html
          test -f site/development-overview/live.js
          test -f site/development-overview/history.js
          test -f site/development-overview/history.json
          test -f site/development-overview/ecosystem-stats.json
