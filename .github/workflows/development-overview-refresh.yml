# Every 4h: refresh issue/PR metrics, open PR with JSON snapshots (main is branch-protected).
name: Development overview refresh (4h)

on:
  schedule:
    # UTC: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: development-overview-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Refresh metrics (GitLab issues + GitHub PRs)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_OVERVIEW_PAGE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_OVERVIEW_PAGE }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          LI_VCS_PROVIDER: gitlab
          LI_GITLAB_SCHEME: http
          ECOSYSTEM_STATS_SKIP_CLONE: "1"
        run: |
          chmod +x scripts/compute-ecosystem-stats.py
          chmod +x scripts/refresh-development-overview.sh
          python3 scripts/compute-ecosystem-stats.py
          ./scripts/refresh-development-overview.sh

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN_OVERVIEW_PAGE }}
          commit-message: "chore: development overview snapshot"
          title: "chore: development overview snapshot"
          body: |
            Automated refresh of `ecosystem-stats.json`, `history.json`, and `status.json`.

            Merging updates issue/PR counts on the [development overview](https://li-langverse.github.io/roadmap/development-overview/) Pages site.
          branch: automated/development-overview-refresh
          delete-branch: false
          labels: |
            automated
            development-overview
          add-paths: |
            data/development-overview/ecosystem-stats.json
            data/development-overview/history.json
            data/development-overview/status.json

      - name: Enable auto-merge when checks pass
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_OVERVIEW_PAGE }}
        run: |
          pr="$(gh pr list --head automated/development-overview-refresh --json number --jq '.[0].number')"
          if [[ -z "$pr" || "$pr" == "null" ]]; then
            echo "No open refresh PR to auto-merge"
            exit 0
          fi
          gh pr merge "$pr" --auto --merge || true
